<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISRIS - 智能股票风险洞察终端</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="dark-theme">
    <header class="terminal-header">
        <div class="logo">
            <i class="fas fa-microchip"></i>
            <span>ISRIS <small>IntelliStock Risk Insight</small></span>
        </div>
        <div class="search-box">
            <input type="text" id="tickerInput" placeholder="输入股票代码 (如 AAPL, 601899)...">
            <button id="searchBtn"><i class="fas fa-radar"></i> 启动深度侦察</button>
        </div>
    </header>

    <main class="main-container">
        <!-- 左侧栏：历史与状态 -->
        <aside class="sidebar">
            <section class="status-panel" id="statusPanel" style="display: none;">
                <h3><i class="fas fa-spinner fa-spin"></i> 当前侦察进度</h3>
                <div class="status-indicator">
                    <div class="step" id="step-processing">搜集多维情报</div>
                    <div class="step" id="step-analyzing">AI 反思研判中</div>
                    <div class="step" id="step-completed">生成研报定稿</div>
                </div>
            </section>

            <section class="history-panel">
                <h3><i class="fas fa-history"></i> 最近探测记录</h3>
                <ul id="historyList">
                    <!-- 历史记录动态加载 -->
                </ul>
            </section>
        </aside>

        <!-- 右侧栏：报告展示 -->
        <section class="content-area">
            <div id="welcomeMessage" class="empty-state">
                <i class="fas fa-chart-line"></i>
                <p>请输入股票代码并启动侦察，或者点击左侧历史记录回看报告。</p>
            </div>

            <div id="reportContainer" style="display: none;">
                <div class="report-header">
                    <h2 id="reportTitle">股票风险评估报告</h2>
                    <div class="risk-gauge">
                        <span id="riskLabel" class="risk-badge">MEDIUM</span>
                        <span id="riskScore">--</span>/100
                    </div>
                </div>
                <hr>
                <div id="markdownContent" class="markdown-body">
                    <!-- Markdown 渲染内容 -->
                </div>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
